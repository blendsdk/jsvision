# Publish the public @jsvision packages to npm, in lockstep, with provenance.
#
# Manually triggered only (workflow_dispatch): GitHub → Actions → Release → Run workflow.
# Versioning is owned by @blendsdk/lockstep: it analyses conventional commits since the
# last tag, bumps every public package to one shared version, and drafts the changelog
# (OpenAI primary, Anthropic fallback). This workflow adds the pieces lockstep leaves to
# the project: a full `yarn verify` gate BEFORE releasing, syncing each package's exported
# VERSION constant to the bumped manifests, a rebuild so the published dist carries the
# new version, and a single release commit + tag.
#
# Only @jsvision/core, @jsvision/ui, @jsvision/files, @jsvision/datagrid, and
# @jsvision/forms are public; every other workspace (including @jsvision/web, which
# stays internal for now) is `private` and npm skips it. Provenance requires the id-token permission
# and a `repository` field in each published package (both satisfied here).
#
# Run with "Dry run" checked first to preview what would publish — it bumps + packs in
# the runner but never commits, tags, pushes, or publishes.
name: Release

on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: 'npm dist-tag to publish under'
        type: choice
        options:
          - latest
          - next
          - beta
        default: latest
      dry-run:
        description: 'Dry run (bump + pack only; no publish, commit, tag, or push)'
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the release commit + tag
      id-token: write # npm provenance (OIDC)
      pull-requests: write # open the back-merge PR into develop
    steps:
      - name: Checkout (full history for conventional-commit analysis)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Verify (lint + typecheck + build + tests + docs guards)
        run: yarn verify

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Prepare the release version and derived artifacts
        run: yarn release:prepare
        env:
          # AI-drafted changelog notes: OpenAI primary, Anthropic fallback. With no
          # key, lockstep writes deterministic fallback entries and still proceeds.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LOCKSTEP_OPENAI_MODEL: ${{ secrets.LOCKSTEP_OPENAI_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Rebuild so published dist carries the new version
        run: yarn build

      - name: Commit + tag the release
        if: ${{ !inputs.dry-run }}
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          git add -A
          git commit -m "chore(release): v${VERSION} [skip ci]"
          git tag "v${VERSION}"

      - name: Publish to npm (lockstep, provenance, push the release commit)
        # Run lockstep by putting node_modules/.bin on PATH and calling it directly,
        # NOT via `yarn lockstep`. `yarn` forces npm_config_registry=registry.yarnpkg.com
        # onto its child processes, which the spawned `npm publish` would then target —
        # but the auth token setup-node wrote is scoped to registry.npmjs.org, so the
        # publish would fail auth against the yarn mirror. Calling lockstep directly keeps
        # the clean npmjs.org env (from .npmrc + npm_config_registry below).
        # The dry run passes --provenance too so it exercises the same pre-flight
        # validation (e.g. the repository-field check) as the real publish.
        run: |
          export PATH="$(pwd)/node_modules/.bin:$PATH"
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "DRY RUN — no packages will be published."
            lockstep publish --tag "${{ inputs.dist-tag }}" --provenance --dry
          else
            lockstep publish --tag "${{ inputs.dist-tag }}" --git-push --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          npm_config_registry: 'https://registry.npmjs.org/'

      # `--git-push` pushes the release BRANCH; the tag created above lives only in the
      # runner and dies with it unless pushed explicitly. Both v0.2.0 and v1.0.0 were lost
      # exactly this way — the release commits are on master, the tags never existed
      # anywhere. Re-pushing a tag that is already on the remote is a no-op, so this is
      # safe to re-run, and it deliberately does NOT tolerate failure: an untagged release
      # is the bug being fixed.
      - name: Push the version tag
        if: ${{ !inputs.dry-run }}
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          git push origin "v${VERSION}"

      # The release commit lands on master, but development continues on develop, which
      # would otherwise keep building on stale manifests — and the NEXT release would
      # analyse conventional commits against a stale base and compute the wrong bump.
      # A PR rather than a direct merge: a back-merge can conflict, and that is a human's
      # call to resolve, not something to force at the end of a publish.
      #
      # This one tolerates failure on purpose. The packages are already public by the time
      # it runs, so a missing back-merge PR must not turn a successful release red — the
      # merge can be opened by hand from the job log.
      - name: Open a back-merge PR into develop
        if: ${{ !inputs.dry-run }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          BRANCH="chore/backmerge-v${VERSION}"
          git push origin "HEAD:refs/heads/${BRANCH}"
          gh pr create --base develop --head "${BRANCH}" \
            --title "chore(release): back-merge v${VERSION} into develop" \
            --body "Brings the v${VERSION} version bump and changelogs from \`master\` back to \`develop\`, so development continues on the manifests that were actually published and the next release computes its bump from the right base. Opened automatically by the Release workflow."
