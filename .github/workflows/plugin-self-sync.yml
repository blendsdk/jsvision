# Plugin self-sync — scaffolded but DISABLED in v1.
#
# This workflow can re-sync the jsvision plugin content (drifted recipe snippets, undocumented
# widgets) when @jsvision/ui changes. It is intentionally inert until a maintainer arms it:
#   - `workflow_dispatch` is the ONLY trigger — it never auto-fires on push/PR/schedule.
#   - the job is hard-gated `if: ${{ false }}`, so even a manual dispatch is a no-op.
#   - it references NO secret, keeping the repo's secret-free CI guarantee intact.
# The deterministic snippet fix needs no key; the AI drafting + PR steps are left commented.
# See tools/claude-plugin/README.md → "Enabling automated sync" for the exact enable steps.
name: plugin-self-sync (disabled — manual only)

on:
  workflow_dispatch: {}

jobs:
  draft:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Deterministic snippet re-sync — no AI, no key. Safe to run unconditionally.
      - name: Re-sync drifted recipe snippets
        run: yarn plugin:sync --fix

      # AI path — draft catalog entries for undocumented widgets. Needs an ANTHROPIC_API_KEY repo
      # secret wired into the env (see the README). Left commented so v1 references no secret.
      # - name: Draft catalog entries (AI)
      #   run: yarn plugin:sync
      # - name: Verify
      #   run: yarn verify
