# CI for @blendsdk/tui (RD-01, PL-3, AR-4, AR-23).
#
# Cross-platform verification matrix: 3 OSes × 3 active-LTS Node versions = 9
# cells, each running the full local gate. No secrets are referenced (AR-21);
# publish-with-provenance is deferred to a later release milestone (PL-3).
name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    name: verify (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint + Prettier)
        run: npm run lint

      - name: Verify (typecheck + test + build)
        run: npm run verify

      - name: Dependency policy guard
        run: npm run check:deps

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Packaging sanity (file allowlist)
        run: npm pack --dry-run
