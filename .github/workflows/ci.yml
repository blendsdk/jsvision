# CI for the jsvision monorepo — build & test only (no deployment).
#
# The project is pre-1.0 and far from release, so there is deliberately NO
# publish/deploy step here (publish-with-provenance comes at a later milestone).
#
# Cross-platform matrix: 3 OSes × 2 supported-LTS Node versions = 6 cells. Every cell
# installs the workspace (yarn), typechecks each package (fail-fast), then runs
# `yarn verify` (lint + turbo typecheck/build/unit-tests/docs-guard) across the packages,
# then guards the dependency policy, the lockstep versions, the
# audit, and the package file set. The end-to-end suites (restore-on-exit, signals,
# pack-and-install, probe) run on POSIX only — their SIGTERM/SIGHUP cases are POSIX,
# and Windows acceptance is deferred (RD-09 DEF-2). No secrets are referenced.
name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    name: build & test (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Per-package typecheck up front (turbo builds each package's deps via `^build`, then
      # `tsc --noEmit` per package) so a type error fails here in seconds with clear per-package
      # attribution, before the heavier build/test in Verify. Verify re-runs it as a cache hit.
      - name: Typecheck (per package, fail-fast)
        run: yarn typecheck

      - name: 'Verify (turbo: lint + typecheck + build + unit tests + docs guard across packages)'
        run: yarn verify

      # Informational only (RD-10 AR-9): prints median/p95, never gates. Scoped to a
      # single cell to avoid 9× noise and Windows shell-quoting (PF-008); the hard
      # 16 ms ceiling is asserted off-CI by perf-budget.spec.test.ts.
      - name: Performance bench (informational — one cell, never fails)
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        continue-on-error: true
        run: yarn bench

      - name: End-to-end tests (POSIX only — SIGTERM/SIGHUP, real child processes)
        if: runner.os != 'Windows'
        run: |
          yarn workspace @jsvision/core test:e2e
          yarn workspace @jsvision/examples test:e2e
          yarn workspace @jsvision/theme-designer test:e2e

      - name: Dependency policy guard (no native runtime deps)
        run: yarn check:deps

      - name: Package VERSION constants match their package.json
        run: node scripts/sync-package-versions.mjs --check

      # Audit PRODUCTION dependencies only: the shipped packages carry zero
      # runtime deps (the whole guarantee), so this is the surface that matters.
      # Dev-only build tooling (VitePress/Vite/esbuild/mermaid for the docs site,
      # Vite/xterm for the examples) never ships and is out of scope here.
      - name: Security audit (high/critical, production deps)
        run: |
          npm install --package-lock-only --ignore-scripts
          npm audit --omit=dev --audit-level=high

      - name: Packaging sanity (file allowlist, no publish)
        run: npm pack --dry-run --workspace @jsvision/core
